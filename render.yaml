services:
  - type: web
    name: aftercallpro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && bash render-build.sh
    startCommand: gunicorn app:app
    runtime: python
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aftercallpro-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false
      - key: STRIPE_ELITE_PRICE_ID
        sync: false

databases:
  - name: aftercallpro-db
    databaseName: aftercallpro
    plan: free
